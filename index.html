</style>
</head>

<body>

<script>

/* LANGUAGE DATA */

const text = {

en:{

about:"About Mehdi Zahmatkesh",
aboutText:"From an early age I have been deeply curious about the human mind and the mechanisms behind behavior and emotion.",
projects:"Research Projects",
books:"Books",

profiles:"Profiles",
contact:"Contact",
project1:"A personalized neuro-audio system designed to reshape identity and behavioral circuits.",
project2:"A psychological framework exploring how internal narratives transform behavior.",
book1:"A neuroscience-informed exploration of addiction and identity transformation.",
book2:"A psychological guide exploring panic attacks and emotional regulation."
},

fa:{
title:"پژوهشگر مستقل علوم اعصاب",
about:"درباره مهدی زحمتکش",
aboutText:"از سنین پایین کنجکاوی عمیقی نسبت به ذهن انسان و سازوکارهای رفتار و هیجان داشتم.",
projects:"پروژه‌های تحقیقاتی",
books:"کتاب‌ها",
publication:"مقاله",
programs:"برنامه‌ها",
profiles:"پروفایل‌های علمی",
contact:"تماس",
project1:"سیستم نورواودیویی برای بازسازی مدارهای هویتی و رفتاری.",
project2:"چارچوب روان‌شناختی برای تغییر رفتار از طریق روایت ذهنی.",
book1:"کتابی درباره ترک سیگار و بازسازی هویت.",
book2:"راهنمای روان‌شناختی برای درک و مدیریت پانیک."
},

tr:{
title:"Bağımsız Nörobilim Araştırmacısı",
about:"Mehdi Zahmatkeş Hakkında",
aboutText:"Küçük yaşlardan itibaren insan zihni ve davranış mekanizmalarına büyük ilgi duydum.",
projects:"Araştırma Projeleri",
books:"Kitaplar",
publication:"Yayın",
programs:"Programlar",
profiles:"Akademik Profiller",
contact:"İletişim",
project1:"Kimlik ve davranış devrelerini yeniden şekillendiren nöro-ses sistemi.",
project2:"İç anlatıların davranışı nasıl değiştirdiğini inceleyen psikolojik çerçeve.",
book1:"Sigara bağımlılığı ve kimlik dönüşümü üzerine kitap.",
book2:"Panik atak ve duygusal düzenleme rehberi."
},

ar:{
title:"باحث مستقل في علم الأعصاب",
about:"حول مهدي زحمتكش",
aboutText:"منذ الصغر كان لدي فضول عميق حول العقل البشري وآليات السلوك والمشاعر.",
projects:"المشاريع البحثية",
books:"الكتب",
publication:"منشور علمي",
programs:"البرامج",
profiles:"الملفات الأكاديمية",
contact:"التواصل",
project1:"نظام صوتي عصبي لإعادة تشكيل دوائر الهوية والسلوك.",
project2:"إطار نفسي لدراسة تأثير السرد الداخلي على السلوك.",
book1:"كتاب حول الإقلاع عن التدخين وتحول الهوية.",
book2:"دليل نفسي لفهم نوبات الهلع."
}

};

/* LANGUAGE DETECTION */

let lang = new URLSearchParams(location.search).get("lang") || navigator.language.slice(0,2);

if(!text[lang]) lang="en";

document.querySelectorAll("[data-key]").forEach(el=>{
el.innerText=text[lang][el.dataset.key];
});

/* RTL */

if(lang==="fa" || lang==="ar"){
document.body.dir="rtl";
}

/* ABOUT */

function openAbout(){
document.getElementById("aboutModal").style.display="flex";
}

function closeAbout(){
document.getElementById("aboutModal").style.display="none";
}

/* NETWORK */

const canvas=document.getElementById("network");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<70;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:Math.random()*0.5,
vy:Math.random()*0.5
});
}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
p.x+=p.vx;
p.y+=p.vy;

if(p.x>canvas.width||p.x<0)p.vx*=-1;
if(p.y>canvas.height||p.y<0)p.vy*=-1;

ctx.beginPath();
ctx.arc(p.x,p.y,2,0,Math.PI*2);
ctx.fillStyle="#2563EB";
ctx.fill();
});

requestAnimationFrame(animate);

}

animate();

</script>

</body>
